codecov:
  require_ci_to_pass: true

ignore:
  - "tests/**"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/*.spec.tsx"

coverage:
  status:
    project:
      default:
        informational: true
        paths:
          - "src/**"
    patch:
      default:
        target: 70%
        threshold: 0%
        only_pulls: true
        paths:
          - "src/**"
